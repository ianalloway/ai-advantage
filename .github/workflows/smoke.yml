name: Production smoke

on:
  workflow_dispatch:
  schedule:
    # Hourly — catch stale/broken ESPN lines quickly.
    - cron: "17 * * * *"
  push:
    branches: [main]
    paths:
      - "netlify/functions/sports-lines.ts"
      - "src/lib/liveSports.ts"
      - "src/lib/oddsValidation.ts"
      - "tests/smoke/**"
      - ".github/workflows/smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production odds smoke
        env:
          SMOKE_BASE_URL: https://aiadvantagesports.com
          SMOKE_MAX_AGE_SECONDS: "900"
        run: npm run test:smoke
